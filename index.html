<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velocity Banking Adventure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary:#2563eb;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#1e293b;
}

*{box-sizing:border-box;font-family:Segoe UI,Arial}
body{margin:0;background:var(--bg);color:var(--text);padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
button{cursor:pointer;padding:10px 16px;border:none;border-radius:8px;font-weight:bold}
.btn-primary{background:var(--primary);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.center{text-align:center}
.hidden{display:none}
.progress{height:12px;background:#e5e7eb;border-radius:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--success);width:0%;transition:.4s}
.log{max-height:180px;overflow:auto;font-size:.85rem}
.log div{padding:4px 0;border-bottom:1px dotted #cbd5e1}
.badge{display:inline-block;padding:6px 10px;border-radius:20px;background:#e0f2fe;color:#0369a1;font-size:.75rem;margin:4px}
</style>
</head>

<body>

<!-- MODE SELECT -->
<div id="modeScreen" class="card center">
<h1>Velocity Banking Adventure</h1>
<p>Select Your Mode</p>
<button class="btn-primary" onclick="startGame('kids')">Kids Mode</button>
<button class="btn-success" onclick="startGame('teen')">Teen Mode</button>
<button class="btn-warning" onclick="startGame('adult')">Adult Mode</button>
<p style="font-size:.8rem;margin-top:10px">Educational Demo • No Financial Advice</p>
</div>

<!-- GAME -->
<div id="game" class="hidden">

<div class="card center">
<h2 id="modeTitle"></h2>
<div>Month: <span id="month">1</span> | Level: <span id="level">1</span> | XP: <span id="xp">0</span></div>
<div class="progress"><div id="xpBar" class="progress-fill"></div></div>
</div>

<div class="grid">
<div class="card">
<h3>Accounts</h3>
<p>Checking: <b id="checking">$0</b></p>
<p>LOC: <b id="loc">$0</b></p>
<p>Mortgage: <b id="mortgage">$250,000</b></p>
</div>

<div class="card">
<h3>Mentor Says 🐱</h3>
<p id="mentorText">Welcome! Let's learn money the fun way.</p>
</div>

<div class="card">
<h3>Actions</h3>
<button class="btn-primary" onclick="nextMonth()">Next Month</button>
<button class="btn-success" onclick="velocityMove()">Velocity Move</button>
<button class="btn-danger" onclick="resetGame()">Reset</button>
</div>
</div>

<div class="card">
<h3>Live Events</h3>
<div id="log" class="log"></div>
</div>

<div class="card">
<h3>Achievements</h3>
<div id="badges"></div>
</div>

</div>

<script>
let state={
 mode:"",
 month:1,
 checking:0,
 loc:0,
 mortgage:250000,
 xp:0,
 level:1,
 income:5000,
 expenses:2500,
 locLimit:15000,
 chunk:3000,
 achievements:{}
};

function startGame(mode){
state.mode=mode;
document.getElementById("modeScreen").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
document.getElementById("modeTitle").innerText=mode.toUpperCase()+" MODE";
mentor(`Welcome to ${mode} mode!`);
}

function mentor(msg){
document.getElementById("mentorText").innerText=msg;
}

function log(msg){
const l=document.getElementById("log");
const d=document.createElement("div");
d.innerText=msg;
l.prepend(d);
}

function gainXP(x){
state.xp+=x;
if(state.xp>=100){
state.level++;
state.xp=0;
mentor("LEVEL UP! You're getting smarter!");
}
updateUI();
}

function nextMonth(){
state.month++;
state.checking+=state.income;
log("+ Income received");
state.checking-=state.expenses;
log("- Expenses paid");

const interest=state.mortgage*0.005;
state.mortgage-=1000;
log("- Mortgage payment");

randomEvent();
gainXP(20);
updateUI();

if(state.mortgage<=0){
mentor("YOU WON! Mortgage destroyed!");
alert("🏆 You Win!");
}
}

function velocityMove(){
if(state.loc+state.chunk>state.locLimit){
mentor("LOC limit reached!");
return;
}
state.loc+=state.chunk;
state.mortgage-=state.chunk;
log(">> Velocity move applied!");
gainXP(30);
checkAchievement("First Velocity");
updateUI();
}

function randomEvent(){
const events=[
"Car repair bill!",
"Bonus income!",
"Unexpected bill!",
"Side hustle success!"
];
const e=events[Math.floor(Math.random()*events.length)];
log("⚡ Event: "+e);
if(e.includes("Bonus")) state.checking+=1000;
if(e.includes("bill")) state.checking-=800;
}

function checkAchievement(name){
if(state.achievements[name]) return;
state.achievements[name]=true;
const b=document.createElement("span");
b.className="badge";
b.innerText=name;
document.getElementById("badges").appendChild(b);
}

function updateUI(){
document.getElementById("month").innerText=state.month;
document.getElementById("level").innerText=state.level;
document.getElementById("xp").innerText=state.xp;
document.getElementById("xpBar").style.width=state.xp+"%";
document.getElementById("checking").innerText="$"+state.checking.toFixed(0);
document.getElementById("loc").innerText="$"+state.loc.toFixed(0);
document.getElementById("mortgage").innerText="$"+state.mortgage.toFixed(0);
}

function resetGame(){
location.reload();
}
</script>

</body>
</html>
